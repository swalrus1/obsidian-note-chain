<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="system-ui, -apple-system, Helvetica, sans-serif">
	<defs>
		<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
			<path d="M0,0 L10,5 L0,10 z" fill="#555"/>
		</marker>
		<style>
			.box      { fill: #ffffff; stroke: #555; stroke-width: 1.5; }
			.root     { fill: #fff3bf; stroke: #b8860b; stroke-width: 2; }
			.title    { font-size: 14px; font-weight: 600; fill: #222; }
			.filename { font-size: 12px; fill: #555; }
			.meta     { font-size: 11px; fill: #888; }
			.edge     { stroke: #555; stroke-width: 1.5; fill: none; }
			.caption  { font-size: 12px; fill: #666; }
		</style>
	</defs>

	<text class="caption" x="350" y="24" text-anchor="middle">Out-edge X → Y means: X contains [[Y]]</text>

	<!-- E (root) -->
	<rect class="root" x="220" y="50" width="260" height="68" rx="8"/>
	<text class="title"    x="350" y="78"  text-anchor="middle">E · Lasagne alla Bolognese</text>
	<text class="filename" x="350" y="96"  text-anchor="middle">bolognese.md  ·  chain: lasagna</text>
	<text class="meta"     x="350" y="112" text-anchor="middle">root — no incoming references</text>

	<!-- D -->
	<rect class="box" x="225" y="170" width="250" height="52" rx="8"/>
	<text class="title"    x="350" y="195" text-anchor="middle">D · Lasagne al forno</text>
	<text class="filename" x="350" y="213" text-anchor="middle">lasagne-al-forno.md</text>

	<!-- B -->
	<rect class="box" x="60" y="280" width="220" height="52" rx="8"/>
	<text class="title"    x="170" y="305" text-anchor="middle">B · Layering technique</text>
	<text class="filename" x="170" y="323" text-anchor="middle">layering.md</text>

	<!-- C -->
	<rect class="box" x="420" y="280" width="220" height="52" rx="8"/>
	<text class="title"    x="530" y="305" text-anchor="middle">C · Béchamel sauce</text>
	<text class="filename" x="530" y="323" text-anchor="middle">bechamel.md</text>

	<!-- A -->
	<rect class="box" x="60" y="390" width="220" height="52" rx="8"/>
	<text class="title"    x="170" y="415" text-anchor="middle">A · Pasta sheets</text>
	<text class="filename" x="170" y="433" text-anchor="middle">pasta-sheets.md</text>

	<!-- Edges -->
	<path class="edge" d="M350,118 L350,170" marker-end="url(#arrow)"/>
	<path class="edge" d="M295,222 L205,280" marker-end="url(#arrow)"/>
	<path class="edge" d="M405,222 L495,280" marker-end="url(#arrow)"/>
	<path class="edge" d="M170,332 L170,390" marker-end="url(#arrow)"/>
</svg>
